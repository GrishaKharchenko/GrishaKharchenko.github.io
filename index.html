<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Григорий Харченко — Аналитик SOC / Специалист по ИБ</title>
<meta name="description" content="Резюме: аналитик SOC, специалист по информационной безопасности. 3.5+ года на режимном предприятии, расследование инцидентов в ELK/Kibana/Wazuh.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@500;600;700;800;900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#05070d;
    --panel:#0a0f18;
    --panel-2:#0d1421;
    --cyan:#00e5ff;
    --magenta:#ff2e88;
    --amber:#ffb000;
    --green:#1dff9f;
    --text:#c6d3e3;
    --text-dim:#647387;
    --line:rgba(0,229,255,0.16);
    --line-soft:rgba(255,255,255,0.06);
    --disp:'Exo 2',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --body:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    --mono:'JetBrains Mono','SFMono-Regular',Consolas,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{scroll-behavior:smooth;}
  body{background:var(--void);color:var(--text);font-family:var(--body);line-height:1.6;font-size:16px;
    -webkit-font-smoothing:antialiased;overflow-x:hidden;}

  /* ---- Ambient layers ---- */
  #threat{position:fixed;inset:0;z-index:0;}
  .vignette{position:fixed;inset:0;z-index:1;pointer-events:none;
    background:
      radial-gradient(1100px 700px at 78% -8%, rgba(0,229,255,0.10), transparent 60%),
      radial-gradient(900px 600px at 8% 6%, rgba(255,46,136,0.10), transparent 58%),
      radial-gradient(100% 100% at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%);}
  .scan{position:fixed;inset:0;z-index:2;pointer-events:none;opacity:.5;
    background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0px,rgba(0,0,0,0) 2px,rgba(0,229,255,0.025) 3px,rgba(0,0,0,0) 4px);
    animation:flick 6s steps(60) infinite;}
  @keyframes flick{0%,100%{opacity:.45}50%{opacity:.6}}

  .wrap{max-width:1040px;margin:0 auto;padding:0 24px;position:relative;z-index:5;}

  /* ---- Custom cursor ---- */
  .cur-ring,.cur-dot{position:fixed;top:0;left:0;z-index:9999;pointer-events:none;border-radius:50%;mix-blend-mode:screen;}
  .cur-ring{width:34px;height:34px;border:1px solid var(--cyan);margin:-17px 0 0 -17px;transition:width .18s,height .18s,margin .18s,border-color .18s,opacity .2s;
    box-shadow:0 0 12px rgba(0,229,255,0.5);}
  .cur-ring::before,.cur-ring::after{content:"";position:absolute;background:var(--cyan);}
  .cur-ring::before{top:50%;left:-6px;width:4px;height:1px;}
  .cur-ring::after{top:-6px;left:50%;width:1px;height:4px;}
  .cur-dot{width:5px;height:5px;background:var(--magenta);margin:-2.5px 0 0 -2.5px;box-shadow:0 0 8px var(--magenta);}
  body.cursor-on{cursor:none;}
  body.cursor-on a,body.cursor-on button{cursor:none;}
  .cur-ring.hot{width:54px;height:54px;margin:-27px 0 0 -27px;border-color:var(--magenta);box-shadow:0 0 16px rgba(255,46,136,0.6);}
  @media (pointer:coarse){.cur-ring,.cur-dot{display:none;}}

  /* ---- Boot overlay ---- */
  #boot{position:fixed;inset:0;z-index:10000;background:var(--void);display:flex;align-items:center;justify-content:center;
    transition:opacity .6s ease;}
  #boot.done{opacity:0;pointer-events:none;}
  .boot-box{font-family:var(--mono);font-size:14px;color:var(--cyan);width:min(520px,86vw);line-height:1.9;}
  .boot-box .ln{white-space:pre;}
  .boot-box .ok{color:var(--green);}
  .boot-box .skip{color:var(--text-dim);font-size:11px;margin-top:18px;}
  .caret{display:inline-block;width:9px;height:15px;background:var(--cyan);margin-left:2px;vertical-align:-2px;animation:blink 1s steps(2) infinite;}
  @keyframes blink{50%{opacity:0}}

  /* ---- Nav / HUD top bar ---- */
  nav{position:sticky;top:0;z-index:60;backdrop-filter:blur(12px);background:rgba(5,7,13,0.6);
    border-bottom:1px solid var(--line);}
  .nav-in{max-width:1040px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;gap:18px;}
  .brand{display:flex;align-items:center;gap:11px;}
  .brand .mk{width:34px;height:34px;border:1px solid var(--cyan);display:grid;place-items:center;font-family:var(--mono);
    font-weight:700;font-size:13px;color:var(--cyan);position:relative;box-shadow:inset 0 0 12px rgba(0,229,255,0.25);}
  .brand .mk::before,.brand .mk::after{content:"";position:absolute;width:6px;height:6px;border:1px solid var(--magenta);}
  .brand .mk::before{top:-1px;left:-1px;border-right:0;border-bottom:0;}
  .brand .mk::after{bottom:-1px;right:-1px;border-left:0;border-top:0;}
  .brand .nm{font-family:var(--disp);font-weight:700;letter-spacing:.02em;}
  .status{display:flex;align-items:center;gap:7px;font-family:var(--mono);font-size:11px;color:var(--green);
    margin-left:4px;text-transform:uppercase;letter-spacing:.1em;}
  .status .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green);animation:pulse 1.6s infinite;}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.35}}
  .nav-links{display:flex;gap:4px;margin-left:auto;}
  .nav-links a{font-family:var(--mono);color:var(--text-dim);text-decoration:none;font-size:12.5px;padding:7px 11px;
    transition:.15s;letter-spacing:.04em;border:1px solid transparent;}
  .nav-links a:hover{color:var(--cyan);border-color:var(--line);}
  .langs{display:inline-flex;border:1px solid var(--line);overflow:hidden;}
  .langs button{font-family:var(--mono);font-size:12px;background:transparent;color:var(--text-dim);border:none;padding:7px 12px;cursor:pointer;transition:.15s;}
  .langs button.active{background:var(--cyan);color:var(--void);font-weight:700;}

  /* ---- Buttons ---- */
  .btn{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.03em;cursor:pointer;text-decoration:none;
    display:inline-flex;align-items:center;gap:10px;padding:12px 20px;position:relative;border:1px solid var(--cyan);
    color:var(--cyan);background:rgba(0,229,255,0.05);clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
    transition:.16s;}
  .btn:hover{background:var(--cyan);color:var(--void);box-shadow:0 0 22px rgba(0,229,255,0.5);}
  .btn .a{font-size:15px;}
  .btn .ic{flex:0 0 auto;display:block;}
  .btn{max-width:100%;}
  .btn.alt{border-color:var(--magenta);color:var(--magenta);background:rgba(255,46,136,0.06);}
  .btn.alt:hover{background:var(--magenta);color:var(--void);box-shadow:0 0 22px rgba(255,46,136,0.5);}

  /* ---- Hero ---- */
  .hero{position:relative;padding:96px 0 70px;}
  .hero .frame{position:relative;}
  .hero-grid{display:grid;grid-template-columns:minmax(0,1fr) 290px;column-gap:40px;align-items:start;
    grid-template-areas:"tag photo" "name photo" "role photo" "lede photo" "cta photo" "ro ro";}
  .h-tag{grid-area:tag}.h-name{grid-area:name}.h-photo{grid-area:photo;align-self:center}
  .h-role{grid-area:role}.h-lede{grid-area:lede}.h-cta{grid-area:cta}.h-ro{grid-area:ro;margin-top:46px}

  /* photo */
  .hero-photo{position:relative;width:100%;max-width:290px;aspect-ratio:1/1.18;overflow:hidden;margin:0;
    border:1px solid var(--cyan);box-shadow:0 0 34px rgba(0,229,255,0.18);}
  .hero-photo img{width:100%;height:100%;object-fit:cover;object-position:50% 30%;display:block;
    filter:contrast(1.07) saturate(1.12) brightness(1.02);}
  .hero-photo .ph-tint{position:absolute;inset:0;mix-blend-mode:overlay;pointer-events:none;
    background:linear-gradient(180deg,rgba(0,229,255,0.18),transparent 42%,rgba(255,46,136,0.22));}
  .hero-photo .ph-grid{position:absolute;inset:0;pointer-events:none;opacity:.45;
    background-image:linear-gradient(rgba(0,229,255,0.09) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,0.09) 1px,transparent 1px);background-size:22px 22px;}
  .hero-photo .ph-scan{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);
    box-shadow:0 0 14px var(--cyan);animation:ph-scan 3.4s ease-in-out infinite;}
  @keyframes ph-scan{0%,100%{top:3%}50%{top:95%}}
  .hero-photo .pc{position:absolute;width:15px;height:15px;border:2px solid var(--magenta);}
  .hero-photo .pc.tl{top:6px;left:6px;border-right:0;border-bottom:0;}
  .hero-photo .pc.tr{top:6px;right:6px;border-left:0;border-bottom:0;}
  .hero-photo .pc.bl{bottom:6px;left:6px;border-right:0;border-top:0;}
  .hero-photo .pc.br{bottom:6px;right:6px;border-left:0;border-top:0;}
  .hero-photo .ph-id{position:absolute;left:0;right:0;bottom:0;font-family:var(--mono);font-size:10.5px;letter-spacing:.12em;
    color:var(--cyan);text-transform:uppercase;padding:18px 10px 9px;background:linear-gradient(0deg,rgba(5,7,13,0.92),transparent);}
  .hero-photo .ph-id b{color:var(--magenta);}
  .corner{position:absolute;width:26px;height:26px;border:2px solid var(--cyan);opacity:.7;}
  .corner.tl{top:-14px;left:-14px;border-right:0;border-bottom:0;}
  .corner.tr{top:-14px;right:-14px;border-left:0;border-bottom:0;}
  .corner.bl{bottom:-14px;left:-14px;border-right:0;border-top:0;}
  .corner.br{bottom:-14px;right:-14px;border-left:0;border-top:0;}
  .tagline{font-family:var(--mono);font-size:12.5px;color:var(--magenta);letter-spacing:.22em;text-transform:uppercase;margin-bottom:22px;}
  .tagline .b{color:var(--text-dim);}
  h1.title{font-family:var(--disp);font-weight:900;font-size:clamp(40px,8.5vw,92px);line-height:.98;letter-spacing:-.01em;color:#eaf6ff;
    text-shadow:3px 0 var(--magenta),-3px 0 var(--cyan);}
  .role{font-family:var(--mono);font-size:clamp(14px,2.2vw,19px);color:var(--cyan);margin-top:20px;letter-spacing:.04em;}
  .role .sep{color:var(--magenta);}
  .lede{max-width:660px;color:var(--text-dim);font-size:16px;line-height:1.75;margin-top:18px;}
  .hero-cta{display:flex;gap:14px;flex-wrap:wrap;margin-top:32px;}

  .readouts{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-top:54px;}
  .ro{border:1px solid var(--line);background:linear-gradient(160deg,rgba(0,229,255,0.04),transparent);padding:16px 18px;position:relative;}
  .ro::after{content:"";position:absolute;top:0;left:0;width:100%;height:2px;background:linear-gradient(90deg,var(--cyan),transparent);}
  .ro .v{font-family:var(--disp);font-weight:800;font-size:26px;color:#eaf6ff;}
  .ro .l{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-top:6px;line-height:1.4;text-transform:uppercase;letter-spacing:.06em;}

  /* ---- Section chrome ---- */
  section.block{padding:64px 0;position:relative;}
  .sec-label{font-family:var(--mono);font-size:12px;color:var(--cyan);letter-spacing:.16em;text-transform:uppercase;
    display:flex;align-items:center;gap:12px;margin-bottom:10px;}
  .sec-label::before{content:"";width:26px;height:1px;background:var(--cyan);}
  .sec-label .id{color:var(--magenta);}
  h2.sec-title{font-family:var(--disp);font-weight:800;font-size:clamp(28px,5vw,46px);line-height:1.08;letter-spacing:-.01em;
    color:#eaf6ff;margin-bottom:34px;}

  /* ---- Panel ---- */
  .panel{border:1px solid var(--line);background:linear-gradient(165deg,rgba(13,20,33,0.7),rgba(10,15,24,0.5));
    backdrop-filter:blur(6px);padding:26px 28px;position:relative;}
  .panel::before,.panel::after{content:"";position:absolute;width:14px;height:14px;border:2px solid var(--cyan);opacity:.55;}
  .panel::before{top:-1px;left:-1px;border-right:0;border-bottom:0;}
  .panel::after{bottom:-1px;right:-1px;border-left:0;border-top:0;}

  .about-p{font-size:17px;line-height:1.85;color:var(--text);}
  .about-p .hl{color:var(--cyan);}

  /* ---- Timeline (experience) ---- */
  .tl{position:relative;padding-left:34px;}
  .tl::before{content:"";position:absolute;left:7px;top:6px;bottom:6px;width:2px;
    background:linear-gradient(180deg,var(--cyan),var(--magenta));box-shadow:0 0 12px rgba(0,229,255,0.4);}
  .job{position:relative;margin-bottom:22px;}
  .job .node{position:absolute;left:-34px;top:6px;width:16px;height:16px;border:2px solid var(--cyan);border-radius:50%;
    background:var(--void);box-shadow:0 0 10px rgba(0,229,255,0.6);}
  .job .node::after{content:"";position:absolute;inset:3px;border-radius:50%;background:var(--magenta);}
  .job-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:6px 18px;align-items:baseline;}
  .job-company{font-family:var(--disp);font-size:20px;color:#eaf6ff;font-weight:700;}
  .job-period{font-family:var(--mono);font-size:12.5px;color:var(--cyan);white-space:nowrap;}
  .job-tag{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--text-dim);border:1px solid var(--line-soft);
    padding:3px 10px;margin:11px 0 6px;letter-spacing:.04em;}
  .job-pos{color:var(--magenta);font-size:14.5px;margin:8px 0 16px;font-weight:600;font-family:var(--mono);}
  ul.bul{list-style:none;display:flex;flex-direction:column;gap:11px;}
  ul.bul li{position:relative;padding-left:22px;font-size:15px;line-height:1.65;color:var(--text);}
  ul.bul li::before{content:"▸";position:absolute;left:0;color:var(--cyan);font-family:var(--mono);}

  /* ---- Grid items ---- */
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
  .item{padding:20px 22px;}
  .item-top{display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px 14px;align-items:baseline;}
  .item-title{font-family:var(--disp);color:#eaf6ff;font-weight:600;font-size:16px;line-height:1.35;}
  .item-year{font-family:var(--mono);font-size:13px;color:var(--cyan);}
  .item-sub{color:var(--text-dim);font-size:13.5px;margin-top:7px;line-height:1.55;}

  /* ---- Skills ---- */
  .lang-row{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:24px;}
  .lpill{font-family:var(--mono);font-size:13px;background:rgba(0,229,255,0.05);border:1px solid var(--line);padding:8px 14px;}
  .lpill b{color:var(--cyan);}
  .marq{overflow:hidden;border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:16px 0;
    -webkit-mask:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);mask:linear-gradient(90deg,transparent,#000 8%,#000 92%,transparent);}
  .marq-track{display:flex;gap:12px;width:max-content;animation:scroll-x 32s linear infinite;}
  .marq:hover .marq-track{animation-play-state:paused;}
  @keyframes scroll-x{to{transform:translateX(-50%);}}
  .chip{font-family:var(--mono);font-size:13px;white-space:nowrap;color:var(--text);background:var(--panel-2);
    border:1px solid var(--line-soft);padding:9px 15px;transition:.15s;}
  .chip:hover{border-color:var(--magenta);color:var(--magenta);box-shadow:0 0 16px rgba(255,46,136,0.3);}
  .chip .h{color:var(--cyan);}

  /* ---- CTA ---- */
  .cta{position:relative;border:1px solid var(--magenta);padding:52px 40px;text-align:center;overflow:hidden;
    background:linear-gradient(135deg,rgba(255,46,136,0.10),rgba(0,229,255,0.06));}
  .cta::before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,transparent,transparent 18px,rgba(255,46,136,0.05) 18px,rgba(255,46,136,0.05) 19px);}
  .cta .lab{font-family:var(--mono);font-size:12px;color:var(--magenta);letter-spacing:.2em;text-transform:uppercase;position:relative;}
  .cta h2{font-family:var(--disp);font-weight:800;font-size:clamp(24px,4vw,38px);color:#eaf6ff;position:relative;margin-top:14px;}
  .cta p{color:var(--text-dim);margin-top:12px;position:relative;}
  .cta-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:28px;position:relative;}

  footer.foot{text-align:center;color:var(--text-dim);font-family:var(--mono);font-size:12px;padding:40px 0 56px;letter-spacing:.05em;}
  footer.foot .blink{color:var(--green);}

  /* ---- Reveal ---- */
  .rv{opacity:0;transform:translateY(34px);clip-path:inset(0 0 100% 0);
    transition:opacity .7s ease,transform .7s cubic-bezier(.2,.7,.2,1),clip-path .8s cubic-bezier(.2,.7,.2,1);will-change:opacity,transform,clip-path;}
  .rv.in{opacity:1;transform:none;clip-path:inset(0 0 0 0);}
  /* fly-in from side (text panels) */
  .rvx{opacity:0;transition:opacity .8s ease,transform .9s cubic-bezier(.16,.84,.24,1);will-change:opacity,transform;}
  .rvx.l{transform:translateX(-120px);}
  .rvx.r{transform:translateX(120px);}
  .rvx.in{opacity:1;transform:none;}
  html.no-js .rv,html.no-js .rvx{opacity:1;transform:none;clip-path:none;}
  /* scroll lock during boot */
  html.no-scroll,body.no-scroll{overflow:hidden!important;height:100%;touch-action:none;}

  @media (max-width:760px){
    .nav-links,.status{display:none;}
    .nav-in{padding:11px 18px;gap:12px;}
    .brand .nm{font-size:14px;}
    .wrap{padding:0 18px;}
    .hero{padding:72px 0 48px;}
    section.block{padding:46px 0;}
    .readouts{grid-template-columns:1fr 1fr;gap:12px;}
    .ro .v{font-size:20px;}
    .grid2{grid-template-columns:1fr;}
    .job-top,.item-top{flex-direction:column;}
    .panel{padding:22px 20px;}
    h1.title{text-shadow:2px 0 var(--magenta),-2px 0 var(--cyan);}
    h2.sec-title{margin-bottom:26px;}
    .hero-grid{grid-template-columns:1fr;column-gap:0;
      grid-template-areas:"tag" "name" "photo" "role" "lede" "cta" "ro";justify-items:start;}
    .hero-photo{max-width:236px;margin:8px 0 4px;}
    .h-ro{margin-top:32px}
    .rvx.l,.rvx.r{transform:translateY(34px);}
    .cta{padding:42px 22px;}
  }
  @media (max-width:480px){
    .wrap{padding:0 15px;}
    .hero{padding:64px 0 42px;}
    h1.title{font-size:clamp(34px,13vw,46px);line-height:1.02;}
    .role{font-size:14px;}
    .readouts{grid-template-columns:1fr;}
    .hero-cta{flex-direction:column;align-items:stretch;width:100%;}
    .hero-cta .btn{justify-content:center;}
    .cta-btns{flex-direction:column;align-items:stretch;}
    .cta-btns .btn{justify-content:center;width:100%;word-break:break-word;}
    .tl{padding-left:26px;}
    .tl::before{left:5px;}
    .job .node{left:-26px;width:13px;height:13px;}
    .job-company{font-size:18px;}
    .boot-box{font-size:12px;}
    .brand .nm{font-size:13px;}
    .langs button{padding:6px 10px;}
  }
  /* ---- Print ---- */
  @media print{
    #threat,.vignette,.scan,.cur-ring,.cur-dot,#boot,nav,.hero-cta,.cta-btns,.marq{display:none!important;}
    body{background:#fff;color:#111;}
    .rv{opacity:1!important;transform:none!important;clip-path:none!important;}
    h1.title{text-shadow:none;color:#111;}
    .role,.tagline,.sec-label,.item-year,.job-period,.job-pos{color:#7a1d5a;}
    .panel{border:1px solid #ccc;background:#fff;backdrop-filter:none;}
    .panel::before,.panel::after{display:none;}
    h2.sec-title,.job-company,.item-title,.ro .v,.cta h2{color:#111;}
    .chip,.lpill{background:#f4f4f4;border:1px solid #ccc;color:#111;}
    ul.bul li::before{color:#7a1d5a;}
    .tl::before,.job .node{background:#7a1d5a;box-shadow:none;}
    .cta{border:1px solid #ccc;background:#fff;}
    .hero{padding:8px 0;}section.block{padding:14px 0;}
  }
</style>
</head>
<body>
<canvas id="threat"></canvas>
<div class="vignette"></div>
<div class="scan"></div>
<div class="cur-ring"></div><div class="cur-dot"></div>

<div id="boot"><div class="boot-box" id="bootbox"></div></div>

<nav>
  <div class="nav-in">
    <div class="brand"><span class="mk" id="mk">ГХ</span><span class="nm" id="nav-name">Григорий Харченко</span>
      <span class="status"><span class="dot"></span><span id="st">в сети · открыт к работе</span></span>
    </div>
    <div class="nav-links" id="nav-links"></div>
    <div class="langs">
      <button id="btn-ru" class="active" onclick="setLang('ru')">RU</button>

/* ---------- Text scramble (decryption effect) ---------- */
const GLYPH="ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789#%&@/\\<>{}[]АБВГДЕЖЗИКЛМНОПРСТУФХЦЧШЩ";
function scramble(el){
  const target=el.getAttribute('data-final')||el.textContent;
  el.setAttribute('data-final',target);
  const dur=Math.min(900,420+target.length*22);
  const start=performance.now();
  function frame(now){
    const p=Math.min(1,(now-start)/dur);
    let out="";
    for(let i=0;i<target.length;i++){
      const ch=target[i];
      if(ch===" "){out+=" ";continue;}
      const reveal=i/target.length;
      if(p>=reveal+0.18 || p>=1){out+=ch;}
      else if(p>=reveal){out+=GLYPH[(Math.random()*GLYPH.length)|0];}
      else out+=GLYPH[(Math.random()*GLYPH.length)|0];
    }
    el.textContent=out;
    if(p<1) requestAnimationFrame(frame); else el.textContent=target;
  }
  requestAnimationFrame(frame);
}

/* ---------- Count-up ---------- */
function countUp(el){
  const raw=el.getAttribute('data-final')||el.textContent;
  el.setAttribute('data-final',raw);
  const m=raw.match(/^([\d]+)([.,](\d+))?(.*)$/s);
  if(!m){ scramble(el); return; }
  const intPart=m[1], dec=m[3]||null, sep=m[2]?m[2][0]:"", suffix=m[4]||"";
  const endVal=parseFloat((intPart+(dec?'.'+dec:''))), decimals=dec?dec.length:0;
  const dur=900,start=performance.now();
  function frame(now){
    const p=Math.min(1,(now-start)/dur), e=1-Math.pow(1-p,3), val=endVal*e;
    let txt=decimals?val.toFixed(decimals).replace('.',sep):Math.round(val).toString();
    el.textContent=txt+suffix;
    if(p<1) requestAnimationFrame(frame); else el.textContent=raw;
  }
  requestAnimationFrame(frame);
}

/* ---------- Reveal ---------- */
let io;
function setupReveal(){
  if(io) io.disconnect();
  const els=[...document.querySelectorAll('.rv,.rvx')];
  let groups={};
  els.forEach(el=>{
    el.classList.remove('in');
    const sec=el.closest('section')||document.body, k=sec.id||'x';
    groups[k]=groups[k]||0;
    el.style.transitionDelay=(Math.min(groups[k],6)*70)+'ms';
    groups[k]++;
  });
  if(typeof IntersectionObserver==='undefined'){ els.forEach(e=>e.classList.add('in')); return; }
  io=new IntersectionObserver((ents)=>{
    ents.forEach(en=>{
      if(en.isIntersecting){
        const el=en.target; el.classList.add('in');
        if(el.matches('[data-scramble]')) scramble(el);
        el.querySelectorAll&&el.querySelectorAll('[data-count]').forEach(c=>countUp(c));
        io.unobserve(el);
      }
    });
  },{threshold:0.12,rootMargin:"0px 0px -8% 0px"});
  const attach=()=>requestAnimationFrame(()=>requestAnimationFrame(()=>els.forEach(e=>io.observe(e))));
  // While the boot intro is up, defer reveals so the hero animates right as it lifts.
  if(typeof bootActive!=='undefined' && bootActive){ pendingAttach=attach; }
  else attach();
  setTimeout(()=>els.forEach(e=>e.classList.add('in')),6000);
}
let pendingAttach=null;

/* ---------- Custom cursor ---------- */
(function cursor(){
  if(window.matchMedia('(pointer:coarse)').matches) return;
  document.body.classList.add('cursor-on');
  const ring=document.querySelector('.cur-ring'), dot=document.querySelector('.cur-dot');
  let mx=innerWidth/2,my=innerHeight/2,rx=mx,ry=my;
  addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;dot.style.transform=`translate(${mx}px,${my}px)`;});
  (function loop(){rx+=(mx-rx)*0.18;ry+=(my-ry)*0.18;ring.style.transform=`translate(${rx}px,${ry}px)`;requestAnimationFrame(loop);})();
  addEventListener('mouseover',e=>{ if(e.target.closest('a,button,.chip,.ro')) ring.classList.add('hot'); });
  addEventListener('mouseout',e=>{ if(e.target.closest('a,button,.chip,.ro')) ring.classList.remove('hot'); });
})();

/* ---------- Magnetic buttons ---------- */
function bindMagnetic(){
  document.querySelectorAll('.btn').forEach(b=>{
    b.onmousemove=e=>{const r=b.getBoundingClientRect();b.style.transform=`translate(${(e.clientX-r.left-r.width/2)*0.25}px,${(e.clientY-r.top-r.height/2)*0.35}px)`;};
    b.onmouseleave=()=>{b.style.transform='';};
  });
}

/* ---------- Threat-graph background ---------- */
(function threat(){
  const c=document.getElementById('threat'),x=c.getContext('2d');
  let W,H,pts=[],raf,mouse={x:-999,y:-999};
  function size(){W=c.width=innerWidth*devicePixelRatio;H=c.height=innerHeight*devicePixelRatio;c.style.width=innerWidth+'px';c.style.height=innerHeight+'px';}
  function init(){const n=Math.min(80,Math.floor(innerWidth/16));pts=[];for(let i=0;i<n;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*0.25*devicePixelRatio,vy:(Math.random()-.5)*0.25*devicePixelRatio,m:Math.random()<0.16});}
  size();init();addEventListener('resize',()=>{size();init();});
  addEventListener('mousemove',e=>{mouse.x=e.clientX*devicePixelRatio;mouse.y=e.clientY*devicePixelRatio;});
  const MAX=(135*devicePixelRatio)**2;
  function draw(){
    x.clearRect(0,0,W,H);
    for(const p of pts){p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;}
    for(let i=0;i<pts.length;i++){
      for(let j=i+1;j<pts.length;j++){
        const a=pts[i],b=pts[j],dx=a.x-b.x,dy=a.y-b.y,d2=dx*dx+dy*dy;
        if(d2<MAX){const al=(1-d2/MAX)*0.5;x.strokeStyle=`rgba(0,229,255,${al*0.5})`;x.lineWidth=devicePixelRatio*0.6;x.beginPath();x.moveTo(a.x,a.y);x.lineTo(b.x,b.y);x.stroke();}
      }
    }
    for(const p of pts){
      const dxm=p.x-mouse.x,dym=p.y-mouse.y,near=(dxm*dxm+dym*dym)<(160*devicePixelRatio)**2;
      x.fillStyle=p.m?(near?'rgba(255,46,136,0.95)':'rgba(255,46,136,0.6)'):(near?'rgba(0,229,255,0.95)':'rgba(0,229,255,0.45)');
      x.beginPath();x.arc(p.x,p.y,(p.m?2.1:1.5)*devicePixelRatio,0,7);x.fill();
    }
    raf=requestAnimationFrame(draw);
  }
  draw();
  document.addEventListener('visibilitychange',()=>{if(document.hidden)cancelAnimationFrame(raf);else draw();});
})();

/* ---------- Scroll lock ---------- */
let bootActive=true;
function lockScroll(){document.documentElement.classList.add('no-scroll');document.body.classList.add('no-scroll');}
function unlockScroll(){bootActive=false;document.documentElement.classList.remove('no-scroll');document.body.classList.remove('no-scroll');
  if(pendingAttach){const f=pendingAttach;pendingAttach=null;f();}}
(function blockers(){
  const stop=e=>{ if(bootActive){ e.preventDefault(); e.stopPropagation(); } };
  addEventListener('wheel',stop,{passive:false});
  addEventListener('touchmove',stop,{passive:false});
  addEventListener('keydown',e=>{ if(bootActive && [32,33,34,35,36,38,40].indexOf(e.keyCode)>-1){ e.preventDefault(); } },{passive:false});
})();

/* ---------- Boot sequence ---------- */
function runBoot(lang){
  const box=document.getElementById('bootbox'), boot=document.getElementById('boot'), lines=DATA[lang].boot;
  let li=0,ci=0,html="";
  function done(){ if(boot.classList.contains('done'))return; boot.classList.add('done'); unlockScroll(); window.scrollTo(0,0); setTimeout(()=>boot.style.display='none',700); }
  boot.addEventListener('click',done); addEventListener('keydown',function k(e){done();removeEventListener('keydown',k);});
  function type(){
    if(li>=lines.length){ html=html.replace(/<span class="caret"><\/span>/,''); box.innerHTML=html; setTimeout(done,420); return; }
    const line=lines[li], isOk=line.includes('OK');
    if(ci===0){html+='<div class="ln">';}
    let shown=line.slice(0,ci);
    if(isOk){ shown=shown.replace(/OK/,'<span class="ok">OK</span>'); }
    box.innerHTML=html+shown+'<span class="caret"></span>';
    ci++;
    if(ci>line.length){ html+=(isOk?line.replace(/OK/,'<span class="ok">OK</span>'):line)+'</div>'; li++; ci=0; setTimeout(type,line.includes('запуск')||line.includes('launch')?260:90); }
    else setTimeout(type,line.length>30?16:30);
  }
  type();
  setTimeout(()=>{ if(!boot.classList.contains('done')) done(); },4200);
}

/* ---------- Lang ---------- */
function setLang(lang){
  document.documentElement.lang=lang;
  document.getElementById('btn-ru').classList.toggle('active',lang==='ru');
  document.getElementById('btn-en').classList.toggle('active',lang==='en');
  render(lang);
  try{localStorage.setItem('resume-lang',lang);}catch(e){}
}

(function init(){
  if('scrollRestoration' in history) history.scrollRestoration='manual';
  window.scrollTo(0,0);
  lockScroll();
  let lang='ru';
  try{const s=localStorage.getItem('resume-lang');if(s==='ru'||s==='en')lang=s;}catch(e){}
  setLang(lang);
  runBoot(lang);
})();
</script>
